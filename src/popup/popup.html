<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Subtitle Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Subtitle Blocker</h1>

    <section>
      <h2>Visibility</h2>
      <div class="mode-select">
        <label><input type="radio" name="vis-mode" value="per-tab"> This tab only</label>
        <label><input type="radio" name="vis-mode" value="global"> All tabs</label>
      </div>
      <button id="toggle-btn" class="primary wide">Hide / Show Overlay</button>
    </section>

    <section>
      <h2>Profiles</h2>
      <div class="profile-controls">
        <select id="profile-select">
          <option value="">-- Select Profile --</option>
        </select>
        <div class="profile-buttons">
          <button id="load-btn">Load</button>
          <button id="delete-btn" class="danger">Delete</button>
        </div>
      </div>
      <div class="save-profile">
        <input type="text" id="profile-name" placeholder="Profile name (e.g. YouTube)">
        <button id="save-btn">Save</button>
      </div>
    </section>

    <section>
      <h2>Appearance</h2>
      <div class="setting-row">
        <label for="opacity-slider">Opacity</label>
        <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.85">
        <span id="opacity-value">85%</span>
      </div>
      <div class="setting-row">
        <label>Color</label>
        <div class="swatches" id="swatches">
          <button type="button" class="swatch" data-color="#000000" style="background:#000000" title="Black"></button>
          <button type="button" class="swatch" data-color="#333333" style="background:#333333" title="Charcoal"></button>
          <button type="button" class="swatch" data-color="#808080" style="background:#808080" title="Grey"></button>
          <button type="button" class="swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
          <button type="button" class="swatch" data-color="#d72638" style="background:#d72638" title="Red"></button>
          <button type="button" class="swatch" data-color="#1e90ff" style="background:#1e90ff" title="Blue"></button>
          <button type="button" class="swatch" data-color="#2ea043" style="background:#2ea043" title="Green"></button>
        </div>
      </div>
      <div class="setting-row">
        <label for="color-hex">Hex</label>
        <input type="text" id="color-hex" placeholder="#000000" maxlength="7" spellcheck="false" autocomplete="off">
      </div>
      <div class="setting-row">
        <label for="blur-slider">Blur</label>
        <input type="range" id="blur-slider" min="0" max="40" step="1" value="0">
        <span id="blur-value">0px</span>
      </div>
    </section>

    <p id="status" class="status"></p>
  </div>

  <script src="../lib/api.js"></script>
  <script src="../lib/constants.js"></script>
  <script src="../lib/profiles.js"></script>
  <script src="popup.js"></script>
</body>
</html>
