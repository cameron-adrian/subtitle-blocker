<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Subtitle Blocker - Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <h1>Subtitle Blocker</h1>

    <section>
      <h2>Profiles</h2>
      <div class="profile-controls">
        <select id="profile-select">
          <option value="">-- Select Profile --</option>
        </select>
        <div class="profile-buttons">
          <button id="load-btn">Load</button>
          <button id="delete-btn" class="danger">Delete</button>
        </div>
      </div>
      <div class="save-profile">
        <input type="text" id="profile-name" placeholder="Profile name (e.g., YouTube - Channel X)">
        <button id="save-btn">Save Current</button>
      </div>
    </section>

    <section>
      <h2>Appearance</h2>
      <div class="setting-row">
        <label for="opacity-slider">Opacity</label>
        <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.85">
        <span id="opacity-value">85%</span>
      </div>
      <div class="setting-row">
        <label for="color-picker">Color</label>
        <input type="color" id="color-picker" value="#000000">
      </div>
    </section>

    <section>
      <h2>Shortcuts</h2>
      <div class="shortcut-list">
        <div class="shortcut-row">
          <kbd>Ctrl+Shift+H</kbd>
          <span>Toggle blocker visibility</span>
        </div>
        <div class="shortcut-row">
          <kbd>Ctrl+Shift+S</kbd>
          <span>Open settings</span>
        </div>
        <div class="shortcut-row">
          <kbd>Ctrl+Shift+Q</kbd>
          <span>Quit</span>
        </div>
      </div>
    </section>
  </div>
  <script src="settings.js"></script>
</body>
</html>
